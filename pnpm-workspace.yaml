# pnpm workspace definition — the four lifecycle buckets.
# See docs/architecture.md for why apps/tools/fixtures/packages are split this way.
packages:
  - 'apps/*' # long-running services (npm bin + Docker image + helm)
  - 'tools/*' # one-shot CLIs / pipelines (npm bin, run-and-exit)
  - 'fixtures/*' # versioned data, zero runtime (published as typed JSON)
  - 'packages/*' # shared internals consumed by the above

# Single source of truth for shared dependency versions across all packages.
# Reference in any package.json as e.g.  "hono": "catalog:".
# This kills the version drift the seed repos show today (npm vs yarn, TS 5.8 vs ts-node).
catalog:
  # runtime / framework
  hono: ^4.7.0
  '@hono/node-server': ^2.0.6
  commander: ^15.0.0
  dotenv: ^17.4.2
  # csm-specific
  '@openzeppelin/merkle-tree': ^1.0.8
  # bls / deposit-key generation
  '@chainsafe/bls': ^8.2.0
  '@chainsafe/bls-keygen': ^0.4.0
  '@chainsafe/ssz': ^1.3.0
  '@scure/bip39': ^2.0.0
  # chain — held on 2.53.x: viem 2.54 added `token` actions whose internal types
  # (viem/_types/actions/token) break recipes' declaration emit (TS2883 — the
  # inferred client type of makeClient becomes non-portable). Revisit when viem
  # re-exports those or recipes annotates makeClient's return explicitly.
  viem: ~2.53.1
  # tooling (also pinned at root, repeated here so packages can opt in)
  typescript: ^6.0.3
  tsdown: ^0.22.3
  vitest: ^4.1.9
  '@types/node': ^26.1.0
  tsx: ^4.19.0

# Dependency version pins (moved here from package.json "pnpm" field — pnpm 11 no
# longer reads that field). See https://pnpm.io/settings. Each entry fixes an active
# advisory — removing any one re-introduces it (verified via `pnpm audit`).
overrides:
  # HIGH: ws <8.21.0 memory-exhaustion DoS — viem→isows requests `ws@*`, which
  # otherwise keeps the older lockfile-pinned 8.20.1.
  'ws@>=8.0.0 <8.21.0': ^8.21.0
  # MODERATE: uuid <11.1.1 missing buffer bounds check — @metamask/utils (via
  # abi-utils → @openzeppelin/merkle-tree) declares uuid ^9.0.1.
  '@metamask/utils>uuid': ^11.1.1
  # LOW: esbuild <0.28.1 dev-server arbitrary file read — vitest→vite caps esbuild
  # at ^0.27.0, so without this it resolves to a vulnerable 0.27.x.
  'esbuild@>=0.27.3 <0.28.1': ^0.28.1
  # (js-yaml override dropped: read-yaml-file's ^3.6.1 already resolves to the
  #  patched 3.15.0 — the only 3.x consumer, so no override is needed.)

# Dependency build-script allowlist (pnpm 11 replaced onlyBuiltDependencies with
# allowBuilds; unreviewed postinstall scripts fail the install by default).
allowBuilds:
  esbuild: true # platform-binary postinstall — required by vitest/vite

minimumReleaseAgeExclude:
  - '@types/node@26.1.0'
