name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # changesets opens/updates the "Version Packages" PR
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # changesets: cuts the version PR, or on merge publishes @sm-lab/* to npm.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node's registry-url exports a user-level .npmrc reading NODE_AUTH_TOKEN,
          # which SHADOWS the ~/.npmrc changesets/action writes from NPM_TOKEN — without
          # this line the publish step hits the registry unauthenticated and 401s.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  # NOTE: a follow-up job builds & pushes Docker images for apps/* on release tags
  # (the npm side and the image side come from the same package — see architecture.md).
